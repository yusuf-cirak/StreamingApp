# @format

name: "streaming-app"

services:
  gateway:
    container_name: streaming-app-gateway
    image: yusufcirak/streaming-app-gateway
    # build:
    #   context: ./media-server/gateway
    #   dockerfile: Dockerfile
    environment:
      - STREAM_API_BASE_URL=${STREAM_API_BASE_URL}
      - STREAM_API_KEY=${STREAM_API_KEY}
    volumes:
      - ./media-server/rtmp/nginx.conf:/etc/nginx/nginx.conf
    restart: unless-stopped
    networks:
      - streaming-app

  nginx-rtmp:
    container_name: streaming-app-nginx-rtmp
    image: tiangolo/nginx-rtmp
    volumes:
      - ./media-server/rtmp/nginx.conf:/etc/nginx/nginx.conf
    restart: unless-stopped
    networks:
      - streaming-app
    depends_on:
      - gateway

  backend:
    container_name: streaming-app-backend
    restart: unless-stopped
    build:
      context: ./backend/src
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
    networks:
      - streaming-app
      - coolify

  frontend:
    container_name: streaming-app-frontend
    image: yusufcirak/streaming-app-frontend
    restart: unless-stopped
    # build:
    #   context: ./frontend
    #   dockerfile: Dockerfile
    networks:
      - streaming-app
    depends_on:
      - backend

networks:
  streaming-app:
    driver: bridge
    name: streaming-app
  coolify:
    external: true
